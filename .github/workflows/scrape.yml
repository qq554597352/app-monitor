name: 爬取APP数据并更新

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）执行一次
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 需要写入权限以提交JSON数据

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # 防止超时（爬7国×30APP约需30-40分钟）

    steps:
      - name: 检出仓库
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 环境
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium --with-deps

      - name: 执行数据采集
        id: scrape
        run: python scripts/collect_data.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          SCRAPE_TOP_N: "30"
        continue-on-error: true

      - name: 检查采集结果
        run: |
          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            echo "⚠️ 数据采集失败，将跳过推送和提交步骤"
            echo "SCRAPE_FAILED=true" >> $GITHUB_ENV
          else
            echo "SCRAPE_FAILED=false" >> $GITHUB_ENV
          fi

      - name: 推送微信日报
        if: env.SCRAPE_FAILED == 'false'
        run: |
          echo "📤 执行微信日报推送..."
          python scripts/push_notification.py
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}

      - name: 提交更新的数据文件
        if: env.SCRAPE_FAILED == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 自动更新APP数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发前端部署
        if: env.SCRAPE_FAILED == 'false'
        run: |
          echo "✅ 数据更新成功，前端将在下一次 deploy.yml 触发时刷新"

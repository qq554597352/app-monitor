name: 爬取APP数据并更新

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）执行一次
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 需要写入权限以提交JSON数据

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # 防止超时（爬7国×30APP约需30-40分钟）

    steps:
      - name: 检出仓库
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 完整历史，避免 shallow clone 导致 push 失败

      - name: 设置 Python 环境
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium --with-deps

      - name: 执行数据采集
        id: scrape
        run: python scripts/collect_data.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          SCRAPE_TOP_N: "30"
        continue-on-error: true

      - name: 检查采集结果
        run: |
          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            echo "⚠️ 数据采集失败，将跳过推送和提交步骤"
            echo "SCRAPE_FAILED=true" >> $GITHUB_ENV
          else
            echo "SCRAPE_FAILED=false" >> $GITHUB_ENV
          fi

      - name: 推送微信日报
        if: env.SCRAPE_FAILED == 'false'
        run: |
          if [ -z "$WECHAT_WEBHOOK_URL" ]; then
            echo "⚠️ WECHAT_WEBHOOK_URL 未配置（在仓库 Settings → Secrets 中添加），跳过微信推送"
          else
            echo "📤 执行微信日报推送..."
            python scripts/push_notification.py && echo "✅ 微信推送完成" || echo "⚠️ 微信推送失败（不影响数据提交）"
          fi
        continue-on-error: true
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}

      - name: 提交更新的数据文件
        if: env.SCRAPE_FAILED == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

          # 诊断：显示 data/ 目录状态
          echo "📁 data/ 目录内容："
          ls -lh data/ 2>/dev/null || echo "  data/ 目录为空"
          ls -lh data/history/ 2>/dev/null || echo "  data/history/ 目录为空"

          git add data/

          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "ℹ️ 数据文件无变更，无需提交"
          else
            echo "📝 提交数据变更..."
            git commit -m "chore: 自动更新APP数据 $(date -u +'%Y-%m-%d %H:%M UTC')"

            echo "🚀 推送到 origin main..."
            git push origin main
            echo "✅ 推送成功"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触发前端部署
        if: env.SCRAPE_FAILED == 'false'
        run: |
          echo "✅ 数据更新成功，前端将在下一次 deploy.yml 触发时刷新"
